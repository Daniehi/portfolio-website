<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ace Games Studio - To-Do App</title>
  <link rel="stylesheet" href="todo.css">
</head>

<body>

  <div class="app">
    <h2>To-Do App</h2>
    <p>Manage your tasks like a developer</p>

    <div class="input-box">
      <input type="text" id="taskInput" placeholder="Enter a task...">
      <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script src="todo.js"></script>
</body>
</html>
