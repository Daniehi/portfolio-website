<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ace Games Studio - Click Game</title>
  <link rel="stylesheet" href="game.css">
</head>

<body>

  <div class="app">
    <h2>Click Challenge</h2>
    <p>Click as fast as you can before time runs out!</p>

    <div class="stats">
      <div>Score: <span id="score">0</span></div>
      <div>Time: <span id="time">10</span>s</div>
    </div>

    <button id="clickBtn" onclick="clickMe()">CLICK ME</button>
    <button class="restart" onclick="startGame()">Restart</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
